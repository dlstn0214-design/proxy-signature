<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>패션 HR 백과사전</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar" aria-label="문서 정보">
        <div class="brand">
          <p>Closed-Book HR Assistant</p>
          <h1>패션 HR 백과사전</h1>
        </div>

        <section class="source-panel">
          <h2>사용 문서</h2>
          <ul id="documentList" class="document-list"></ul>
        </section>

        <section class="source-panel">
          <h2>답변 원칙</h2>
          <p>두 PDF에서 찾은 근거만 사용합니다. 근거가 없으면 모른다고 답합니다.</p>
        </section>
      </aside>

      <section class="workspace" aria-label="질의응답">
        <header class="topbar">
          <div>
            <p class="eyebrow">SAP 매뉴얼 + 취업규칙 전용</p>
            <h2>문서 내용만 검색해 답변합니다</h2>
          </div>
          <span id="status" class="status">색인 로딩</span>
        </header>

        <div id="chat" class="chat" aria-live="polite">
          <article class="message agent">
            <span class="avatar">AI</span>
            <div class="bubble">
              <p>질문을 입력하면 두 백과사전에서 근거를 찾아 답변합니다.</p>
            </div>
          </article>
        </div>

        <form id="askForm" class="composer">
          <input
            id="questionInput"
            type="search"
            autocomplete="off"
            placeholder="예: 연차휴가는 어떻게 계산해?"
            aria-label="질문"
          />
          <button type="submit">질문</button>
        </form>

        <div class="quick-prompts" aria-label="예시 질문">
          <button type="button" data-prompt="SAP에서 휴가 신청은 어떻게 처리해?">SAP 휴가 신청</button>
          <button type="button" data-prompt="취업규칙상 근무시간과 휴게시간을 알려줘">근무시간</button>
          <button type="button" data-prompt="퇴직 관련 규정 내용을 찾아줘">퇴직 규정</button>
          <button type="button" data-prompt="증명서 발급 절차가 있으면 알려줘">증명서 발급</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
